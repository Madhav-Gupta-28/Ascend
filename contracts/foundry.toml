[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
hedera_testnet = "${HEDERA_JSON_RPC}"

[etherscan]
hedera_testnet = { key = "", url = "https://server-verify.hashscan.io" }
